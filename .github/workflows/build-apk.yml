name: Build APK

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 🤖 检查 Android SDK
        run: |
          echo "ANDROID_HOME=${{ env.ANDROID_HOME }}"
          echo "ANDROID_SDK_ROOT=${{ env.ANDROID_SDK_ROOT }}"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "ANDROID_HOME 未设置"
          which sdkmanager 2>/dev/null || find / -name sdkmanager -type f 2>/dev/null | head -3

      - name: 📦 安装所需 SDK
        run: |
          ANDROID_HOME="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          ls $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager 2>/dev/null || \
            ls $ANDROID_HOME/tools/bin/sdkmanager 2>/dev/null || \
            echo "sdkmanager 未找到"

      - name: 🔧 授权 Gradle 执行权限
        run: chmod +x gradlew

      - name: 🏗️ 编译 Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle.log
        shell: bash

      - name: 📤 上传编译日志（供诊断）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: gradle.log
          if-no-files-found: warn

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: AcousticsCalculator-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: 🏗️ 编译 Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: 📤 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AcousticsCalculator-Release-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: 🏷️ 创建 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
