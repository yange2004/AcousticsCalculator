name: Build APK

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 🤖 设置 Android SDK 环境
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "无 platforms"

      - name: 📦 安装所需 SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME

      - name: 🔧 授权 Gradle 执行权限
        run: chmod +x gradlew

      - name: 🏗️ 编译 Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: AcousticsCalculator-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: 🏗️ 编译 Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: 📤 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AcousticsCalculator-Release-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: 🏷️ 创建 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
